{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "socket-firewall.fullname" . }}
  labels:
    {{- include "socket-firewall.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.hosts }}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "socket-firewall.fullname" $ }}
                port:
                  number: 443
          {{- end }}
    {{- end }}
    {{- else }}
    # Default: route all traffic to the firewall (transparent proxy mode)
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "socket-firewall.fullname" . }}
                port:
                  number: 443
    {{- end }}
{{- end }}
