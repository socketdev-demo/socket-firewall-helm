# Socket Firewall Helm Chart Values

# Image configuration
image:
  repository: socketdev/socket-registry-firewall
  # For production, pin to a specific version (e.g., "1.0.33")
  tag: latest
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets: []
# - name: my-registry-secret

# Number of replicas (ignored if autoscaling is enabled)
replicaCount: 1

# Pod Disruption Budget (keeps pods available during node maintenance)
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # Alternative to minAvailable

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# Socket API configuration
socket:
  # API token for Socket.dev (required)
  # Required scopes: packages, entitlements:list
  # Set via --set socket.apiToken=xxx or create secret manually
  apiToken: ""
  # Name of existing secret containing SOCKET_SECURITY_API_TOKEN
  existingSecret: ""
  existingSecretKey: "SOCKET_SECURITY_API_TOKEN"
  # Allow package downloads if Socket API is unavailable (default: true)
  # Set to false for strict security (blocks all packages if API is down)
  failOpen: true
  # Cache TTL for Socket API responses in seconds (default: 600 = 10 minutes)
  cacheTtl: 600

# Path-based routing (recommended — single domain with path prefixes)
# See: https://docs.socket.dev/docs/registry-mode-configuration-reference
pathRouting:
  enabled: false
  domain: ""
  # config_mode: upstream or middle (omit for downstream, which is default)
  configMode: ""
  routes: []
  # - path: /npm
  #   upstream: https://registry.npmjs.org
  #   registry: npm
  # - path: /pypi
  #   upstream: https://pypi.org
  #   registry: pypi
  # - path: /maven
  #   upstream: https://repo1.maven.org/maven2
  #   registry: maven
  # - path: /cargo
  #   upstream: https://index.crates.io
  #   registry: cargo
  # - path: /rubygems
  #   upstream: https://rubygems.org
  #   registry: rubygems
  # - path: /nuget
  #   upstream: https://api.nuget.org
  #   registry: nuget
  # - path: /go
  #   upstream: https://proxy.golang.org
  #   registry: go
  # - path: /conda
  #   upstream: https://conda.anaconda.org
  #   registry: conda

# Domain-based routing (alternative — each registry gets its own subdomain)
# Only used when pathRouting.enabled is false
registries:
  npm:
    enabled: false
    domains:
      - npm.company.local
  pypi:
    enabled: false
    domains:
      - pypi.firewall.local
  maven:
    enabled: false
    domains:
      - maven.firewall.local
  rubygems:
    enabled: false
    domains:
      - rubygems.firewall.local
  cargo:
    enabled: false
    domains:
      - cargo.firewall.local
  openvsx:
    enabled: false
    domains:
      - openvsx.firewall.local
  nuget:
    enabled: false
    domains:
      - nuget.firewall.local
  go:
    enabled: false
    domains:
      - go.firewall.local
  conda:
    enabled: false
    domains:
      - conda.firewall.local

# Proxy tuning
proxy:
  bufferSize: "16k"
  buffersCount: 8
  buffersSize: "16k"
  connectTimeout: 60
  sendTimeout: 60
  readTimeout: 60

# Nginx performance tuning
nginx:
  workerProcesses: 2
  workerConnections: 4096

# Metadata filtering (removes blocked/warned packages from registry metadata responses)
metadataFiltering:
  enabled: false
  filterBlocked: true
  filterWarn: false
  includeUncheckedVersions: true
  maxVersions: 100
  cacheTtl: 3600
  batchSize: 4000

# Redis caching for Socket API lookups
redis:
  enabled: false
  host: redis
  port: 6379
  password: ""
  db: 0
  timeout: 1000
  poolSize: 100
  ttl: 86400
  ssl: false
  sslVerify: true
  sslCaCert: ""
  sslClientCert: ""
  sslClientKey: ""

# Splunk HEC integration
splunk:
  enabled: false
  hecUrl: ""
  hecToken: ""
  index: "sfw-hec"
  source: "sfw-event"

# Webhook event delivery (fires on package decisions)
webhook:
  enabled: false
  url: ""
  sslVerify: true
  timeout: 5000
  onBlock: true
  onWarn: true
  onMonitor: true
  onIgnore: false

# Service configuration
service:
  type: ClusterIP
  httpPort: 80
  httpsPort: 443
  # Override HTTPS targetPort (set to "http" when TLS is terminated at the load balancer)
  httpsTargetPort: ""
  annotations: {}
    # service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    # service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

# Ingress configuration
ingress:
  enabled: false
  className: ""  # e.g., "nginx", "traefik", "alb"
  annotations: {}
    # For AWS ALB:
    # kubernetes.io/ingress.class: alb
    # alb.ingress.kubernetes.io/scheme: internal
    # For nginx:
    # nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # nginx.ingress.kubernetes.io/ssl-passthrough: "true"
  hosts: []
    # - host: sfw.company.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls: []
    # - secretName: sfw-tls
    #   hosts:
    #     - sfw.company.com

# TLS configuration
tls:
  # Generate self-signed certificates (for testing)
  generateSelfSigned: true
  # Use existing secret with tls.crt and tls.key
  existingSecret: ""
  # Set to true when using cert-manager (remaps tls.crt/tls.key to fullchain.pem/privkey.pem)
  certManager: false
  # Certificate data (base64 encoded, only used if generateSelfSigned is false and existingSecret is empty)
  certificate: ""
  privateKey: ""

# Resource limits
resources:
  limits:
    cpu: "1"
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

# Health check configuration
healthCheck:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 101

# Container security context
securityContext: {}
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 101

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Extra containers to run alongside the firewall (e.g., auth sidecars, log collectors)
extraContainers: []
# - name: auth-sidecar
#   image: my-org/auth-proxy:latest
#   ports:
#     - containerPort: 8443
#   env:
#     - name: UPSTREAM_PORT
#       value: "443"

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}
