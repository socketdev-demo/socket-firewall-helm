# Socket Firewall Helm Chart Values

# Image configuration
image:
  repository: socketdev/socket-registry-firewall
  # For production, pin to a specific version (e.g., "1.0.33")
  tag: latest
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets: []
# - name: my-registry-secret

# Number of replicas (ignored if autoscaling is enabled)
replicaCount: 1

# Pod Disruption Budget (keeps pods available during node maintenance)
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # Alternative to minAvailable

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# Socket API configuration
socket:
  # API token for Socket.dev (required)
  # Required scopes: packages, entitlements:list
  # Set via --set socket.apiToken=xxx or create secret manually
  apiToken: ""
  # Name of existing secret containing SOCKET_SECURITY_API_TOKEN
  existingSecret: ""
  existingSecretKey: "SOCKET_SECURITY_API_TOKEN"
  # Allow package downloads if Socket API is unavailable (default: true)
  # Set to false for strict security (blocks all packages if API is down)
  failOpen: true
  # Cache TTL for Socket API responses in seconds (default: 600 = 10 minutes)
  cacheTtl: 600

# Registry configuration
# Each registry can have custom domains for proxying
registries:
  npm:
    enabled: false
    domains:
      - npm.company.local
  pypi:
    enabled: false
    domains:
      - pypi.firewall.local
  maven:
    enabled: false
    domains:
      - maven.firewall.local
  rubygems:
    enabled: false
    domains:
      - rubygems.firewall.local
  cargo:
    enabled: false
    domains:
      - cargo.firewall.local
  openvsx:
    enabled: false
    domains:
      - openvsx.firewall.local
  nuget:
    enabled: false
    domains:
      - nuget.firewall.local
  go:
    enabled: false
    domains:
      - go.firewall.local

# Proxy tuning
proxy:
  bufferSize: "16k"
  buffersCount: 8
  buffersSize: "16k"
  connectTimeout: 60
  sendTimeout: 60
  readTimeout: 60

# Service configuration
service:
  type: ClusterIP
  httpPort: 80
  httpsPort: 443

# Ingress configuration
ingress:
  enabled: false
  className: ""  # e.g., "nginx", "traefik", "alb"
  annotations: {}
    # For AWS ALB:
    # kubernetes.io/ingress.class: alb
    # alb.ingress.kubernetes.io/scheme: internal
    # For nginx:
    # nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # nginx.ingress.kubernetes.io/ssl-passthrough: "true"
  hosts: []
    # - host: sfw.company.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls: []
    # - secretName: sfw-tls
    #   hosts:
    #     - sfw.company.com

# TLS configuration
tls:
  # Generate self-signed certificates (for testing)
  generateSelfSigned: true
  # Use existing secret with tls.crt and tls.key
  existingSecret: ""
  # Certificate data (base64 encoded, only used if generateSelfSigned is false and existingSecret is empty)
  certificate: ""
  privateKey: ""

# Resource limits
resources:
  limits:
    cpu: "1"
    memory: 768Mi
  requests:
    cpu: 500m
    memory: 512Mi

# Health check configuration
healthCheck:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 101

# Container security context
securityContext: {}
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 101

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Extra containers to run alongside the firewall (e.g., auth sidecars, log collectors)
extraContainers: []
# - name: auth-sidecar
#   image: my-org/auth-proxy:latest
#   ports:
#     - containerPort: 8443
#   env:
#     - name: UPSTREAM_PORT
#       value: "443"

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}
